name: mycycle

services:
  admin-web:
    container_name: mycycle-admin-web
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/admin-web:/app
      - admin_web_modules:/app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./apps/admin-web/.env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

  sponsor-web:
    container_name: mycycle-sponsor-web
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/sponsor-web:/app
      - sponsor_web_modules:/app/node_modules
    ports:
      - "5174:5173"
    env_file:
      - ./apps/sponsor-web/.env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

  donor-mobile:
    container_name: mycycle-donor-mobile
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/donor-mobile:/app
      - donor_mobile_modules:/app/node_modules
    ports:
      - "8082:8082"
      - "19002:19002"
    env_file:
      - ./apps/donor-mobile/.env
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    command: sh -c "npm install && npx expo start --port 8082 --tunnel"
    restart: unless-stopped

  collector-mobile:
    container_name: mycycle-collector-mobile
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/collector-mobile:/app
      - collector_mobile_modules:/app/node_modules
    ports:
      - "8081:8081"
      - "19001:19001"
    env_file:
      - ./apps/collector-mobile/.env
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    command: sh -c "npm install && npx expo start --port 8081 --tunnel"
    restart: unless-stopped

volumes:
  admin_web_modules:
  sponsor_web_modules:
  donor_mobile_modules:
  collector_mobile_modules:
